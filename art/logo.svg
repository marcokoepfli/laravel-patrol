  <circle cx="42" cy="16" r="5.5" fill="#FEBC2E"/>
  <circle cx="60" cy="16" r="5.5" fill="#28C840"/>

  <!-- PATROL block letters — unit=8px, stroke=10px wide -->
  <g fill="url(#g)">
