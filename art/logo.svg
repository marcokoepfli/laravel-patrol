    <rect x="40" y="42" width="10" height="92"/>
    <rect x="50" y="42" width="34" height="10"/>
    <rect x="84" y="42" width="10" height="46"/>
    <rect x="50" y="78" width="34" height="10"/>

    <!-- A -->
    <rect x="108" y="52" width="10" height="82"/>
    <rect x="118" y="42" width="28" height="10"/>
    <rect x="146" y="52" width="10" height="82"/>
    <rect x="118" y="82" width="28" height="10"/>

    <!-- T -->
    <rect x="170" y="42" width="50" height="10"/>
    <rect x="190" y="52" width="10" height="82"/>

    <!-- R -->
    <rect x="234" y="42" width="10" height="92"/>
    <rect x="244" y="42" width="34" height="10"/>
    <rect x="278" y="42" width="10" height="46"/>
    <rect x="244" y="78" width="34" height="10"/>
